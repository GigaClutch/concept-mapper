name: Deploy viewer/ to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Allow the workflow to mint an OIDC token and publish Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Quality gate: a red or stale graph must fail the deploy, not ship silently.
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate graph (quotes need cache/, which is local-only)
        run: python pipeline/validate.py --allow-missing-cache

      - name: Gold-set evaluation
        run: python pipeline/evaluate.py --graph

      - name: Unit tests
        run: python -m unittest discover tests

      - name: Bundle freshness (committed viewer data matches data/)
        run: |
          python pipeline/build_viewer_data.py
          python pipeline/build_review_data.py
          git diff --exit-code viewer/

  deploy:
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (build type = GitHub Actions) from the workflow itself,
          # so no manual Settings > Pages > Source step is needed.
          enablement: true

      - name: Upload viewer/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: viewer

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
