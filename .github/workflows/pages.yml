name: Deploy viewer/ to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Allow the workflow to mint an OIDC token and publish Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload viewer/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: viewer

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
